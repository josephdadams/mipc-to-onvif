services:

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mipc-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP — NVR streams cameras from here
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    networks:
      - mipc-net

  mipc-proxy:
    build: .
    container_name: mipc-proxy
    restart: unless-stopped
    depends_on:
      - mediamtx
    ports:
      - "8080:8080"           # Web UI
      - "8081-8090:8081-8090" # ONVIF — one port per camera (up to 10)
    volumes:
      - ./config.yml:/app/config.yml
    environment:
      - CONFIG_PATH=/app/config.yml
      - PYTHONUNBUFFERED=1
    networks:
      - mipc-net

networks:
  mipc-net:
    driver: bridge
